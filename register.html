<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন | FDMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛽ ফুয়েল ডিস্ট্রিবিউশন ম্যানেজমেন্ট সিস্টেম</h1>
            <p>নতুন গাড়ি রেজিস্ট্রেশন (পাম্প কর্তৃপক্ষ করবেন)</p>
            <div class="nav-buttons">
                <a href="index.html" class="btn-primary">🏠 হোম</a>
                <a href="register.html" class="btn-info">📝 রেজিস্ট্রেশন</a>
                <a href="login.html" class="btn-primary">🔐 পাম্প লগইন</a>
            </div>
        </div>

        <div class="card">
            <h2>📝 নতুন গাড়ি রেজিস্ট্রেশন</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>পূর্ণ নাম *</label>
                    <input type="text" id="fullName" required>
                </div>
                
                <div class="form-group">
                    <label>NID নম্বর *</label>
                    <input type="text" id="nid" required>
                </div>
                
                <div class="form-group">
                    <label>গাড়ির নম্বর *</label>
                    <input type="text" id="vehicleNo" required placeholder="যেমন: 4455 বা ঢাকা-১১-১২৩৪">
                </div>
                
                <div class="form-group">
                    <label>গাড়ির ধরন *</label>
                    <select id="vehicleType" required>
                        <option value="">-- সিলেক্ট করুন --</option>
                        <option value="bike">🛵 বাইক</option>
                        <option value="car">🚗 গাড়ি</option>
                        <option value="truck">🚛 ট্রাক/পিকআপ</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>গাড়ির মালিকানা ধরন *</label>
                    <select id="ownershipType" required onchange="toggleIdCardUpload()">
                        <option value="">-- সিলেক্ট করুন --</option>
                        <option value="private">🏠 মালিকানা গাড়ি</option>
                        <option value="rental_marketing">🚕 ভাড়া/মার্কেটিং গাড়ি</option>
                    </select>
                </div>
                
                <div id="idCardSection" class="hidden">
                    <div class="form-group">
                        <label>🆔 চাকরি আইডি কার্ড নম্বর *</label>
                        <input type="text" id="idCardNumber" placeholder="যেমন: RID-123456">
                    </div>
                    <div class="form-group">
                        <label>🏢 কোম্পানির নাম *</label>
                        <input type="text" id="companyName" placeholder="যেমন: Uber, Pathao, Foodpanda">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📞 মোবাইল নম্বর *</label>
                    <input type="tel" id="mobile" required>
                </div>
                
                <button type="submit" class="btn-primary">✅ রেজিস্ট্রেশন করুন</button>
            </form>
            <div id="registerMessage"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
